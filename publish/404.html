<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — SlapSec</title>

<style>
:root{--bg:#050505;--fg:#f2f0ea;--fg-dim:#8b8878;--lime:#caff3d;--cyan:#22e5ff;--red:#ff1b2d;--line:rgba(242,240,234,0.14);--display:"Bricolage Grotesque",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:140px 140px;opacity:.4;mask-image:radial-gradient(ellipse at center,#000 10%,transparent 75%);-webkit-mask-image:radial-gradient(ellipse at center,#000 10%,transparent 75%)}
.wrap{position:relative;z-index:1}
.code{font-family:var(--display);font-weight:800;font-size:clamp(90px,22vw,220px);line-height:.9;letter-spacing:-.05em;color:var(--fg)}
.code span{color:var(--red)}
.tag{font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--cyan);margin:20px 0 10px}
p{color:var(--fg-dim);font-size:14px;letter-spacing:.02em;line-height:1.7;max-width:420px;margin:0 auto 32px}
a.home{display:inline-flex;align-items:center;gap:10px;background:var(--lime);color:var(--bg);text-decoration:none;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:14px 22px;transition:transform .2s,background .2s}
a.home:hover{background:var(--fg);transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">4<span>0</span>4</div>
  <div class="tag">// Route not found</div>
  <p>This path doesn't exist — or it's been rotated out. Nothing was compromised; you just took a wrong turn.</p>
  <a class="home" href="/">← Back to slapsec.com</a>
</div>
</body>
</html>
